<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FreeDOS 772</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #008080;
      font-family: "Arial", sans-serif;
      font-size: 11px;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── OUTER WINDOW ── */
    #win {
      display: flex;
      flex-direction: column;
      width: min(860px, 100vw);
      height: 100vh;
      /* Win95 raised border: white TL, dark BR, black outline */
      border-top:    2px solid #fff;
      border-left:   2px solid #fff;
      border-right:  2px solid #000;
      border-bottom: 2px solid #000;
      outline: 1px solid #808080;
      background: #c0c0c0;
    }

    /* ── TITLE BAR ── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 20px;
      padding: 0 2px;
      flex-shrink: 0;
      background: linear-gradient(to right, #000080 0%, #1084d0 100%);
      user-select: none;
    }

    #titlebar-left {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    #title-icon {
      width: 16px;
      height: 16px;
      background: #000;
      border: 1px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: monospace;
      font-size: 6px;
      color: #00cc00;
      line-height: 1;
      padding-top: 1px;
    }

    #titlebar span {
      color: #fff;
      font-weight: bold;
      font-size: 11px;
    }

    #titlebar-btns {
      display: flex;
      gap: 2px;
    }

    /* ── WIN95 BUTTON BASE ── */
    .w95btn {
      background: #c0c0c0;
      border-top:    1px solid #fff;
      border-left:   1px solid #fff;
      border-right:  1px solid #808080;
      border-bottom: 1px solid #808080;
      outline: 1px solid #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-family: "Arial", sans-serif;
      font-size: 11px;
      user-select: none;
    }

    .w95btn:hover {
      background: #d4d0c8;
      border-top:    1px solid #fff;
      border-left:   1px solid #fff;
      border-right:  1px solid #404040;
      border-bottom: 1px solid #404040;
    }

    .w95btn:active, .w95btn.pressed {
      background: #b8b4ac;
      border-top:    1px solid #808080;
      border-left:   1px solid #808080;
      border-right:  1px solid #fff;
      border-bottom: 1px solid #fff;
    }

    /* title bar buttons are smaller */
    .titlebtn {
      width: 16px;
      height: 14px;
      font-size: 9px;
      font-weight: bold;
      outline: 1px solid #000;
    }

    /* ── MENU BAR ── */
    #menubar {
      display: flex;
      align-items: center;
      height: 18px;
      padding: 0 2px;
      flex-shrink: 0;
      background: #c0c0c0;
      border-bottom: 1px solid #808080;
    }

    .menuitem {
      padding: 1px 6px;
      cursor: pointer;
      color: #000;
    }

    .menuitem:hover {
      background: #000080;
      color: #fff;
    }

    /* ── TOOLBAR ── */
    #toolbar {
      display: flex;
      align-items: center;
      height: 26px;
      padding: 2px 4px;
      gap: 3px;
      flex-shrink: 0;
      background: #c0c0c0;
      border-bottom: 1px solid #808080;
    }

    .tb-sep {
      width: 1px;
      height: 18px;
      background: #808080;
      box-shadow: 1px 0 0 #fff;
      margin: 0 2px;
    }

    .tbbtn {
      width: 22px;
      height: 20px;
      font-size: 11px;
    }

    .tbbtn:hover { background: #d4d0c8; }

    .tb-dropdown {
      height: 18px;
      width: 54px;
      background: #fff;
      border-top:    1px solid #808080;
      border-left:   1px solid #808080;
      border-right:  1px solid #fff;
      border-bottom: 1px solid #fff;
      font-family: "Arial", sans-serif;
      font-size: 11px;
      padding: 0 2px;
      cursor: pointer;
    }

    /* ── SCREEN AREA ── */
    #screen-wrap {
      flex: 1;
      position: relative;
      margin: 6px;
      /* sunken inset */
      border-top:    1px solid #808080;
      border-left:   1px solid #808080;
      border-right:  1px solid #fff;
      border-bottom: 1px solid #fff;
      outline: 1px solid #000;
      background: #000;
      overflow: hidden;
    }

    #screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #screen canvas {
      display: block;
      image-rendering: pixelated;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── STATUS BAR ── */
    #statusbar {
      display: flex;
      align-items: center;
      height: 20px;
      padding: 0 4px;
      gap: 4px;
      flex-shrink: 0;
      background: #c0c0c0;
      border-top: 1px solid #808080;
    }

    .status-pane {
      height: 14px;
      padding: 0 6px;
      border-top:    1px solid #808080;
      border-left:   1px solid #808080;
      border-right:  1px solid #fff;
      border-bottom: 1px solid #fff;
      display: flex;
      align-items: center;
      color: #000;
      white-space: nowrap;
    }

    /* ── BOTTOM CONTROLS BAR ── */
    #bottombar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      padding: 3px 6px;
      flex-shrink: 0;
      background: #c0c0c0;
      border-top: 1px solid #fff;
    }

    .feat-btn {
      padding: 2px 10px;
      height: 20px;
      font-size: 11px;
    }

    /* ── CONTROLS SECTION (add stuff here later) ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      flex-shrink: 0;
      background: #c0c0c0;
      border-top: 1px solid #fff;
    }

    /* ── SCANLINES OVERLAY ── */
    #scanlines { display: none; }
  </style>
</head>
<body>
<div id="win">

  <!-- Title Bar -->
  <div id="titlebar">
    <div id="titlebar-left">
      <div id="title-icon">C:\</div>
      <span>MS-DOS Prompt — FreeDOS 772</span>
    </div>
    <div id="titlebar-btns">
      <button class="w95btn titlebtn" title="Minimize">_</button>
      <button class="w95btn titlebtn" title="Maximize">□</button>
      <button class="w95btn titlebtn" id="btn-close" title="Close">✕</button>
    </div>
  </div>

  <!-- Menu Bar -->
  <div id="menubar">
    <span class="menuitem">File</span>
    <span class="menuitem">Edit</span>
    <span class="menuitem">View</span>
    <span class="menuitem">Help</span>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <select class="tb-dropdown" title="Font size">
      <option>Auto</option>
      <option>8x8</option>
      <option>8x12</option>
      <option>8x16</option>
    </select>
    <div class="tb-sep"></div>
    <button class="w95btn tbbtn" title="Properties">⚙</button>
    <button class="w95btn tbbtn" title="Copy">⧉</button>
    <button class="w95btn tbbtn" title="Paste">❐</button>
    <button class="w95btn tbbtn" id="btn-fullscreen" title="Fullscreen">⛶</button>
    <button class="w95btn tbbtn" title="Font" style="font-family:serif;font-weight:bold;">A</button>
  </div>

  <!-- Screen -->
  <div id="screen-wrap">
    <div id="screen"></div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="status-pane" id="status-msg">Booting FreeDOS...</div>
    <div class="status-pane">MEM: 32MB</div>
    <div class="status-pane">VGA: 8MB</div>
    <div class="status-pane" id="status-time"></div>
  </div>

  <!-- Bottom Feature Buttons -->
  <div id="bottombar">
    <button class="w95btn feat-btn" id="btn-reset">Restart</button>
    <button class="w95btn feat-btn" id="btn-mute">Mute: OFF</button>
    <button class="w95btn feat-btn" id="btn-screenshot">Screenshot</button>
    <button class="w95btn feat-btn" id="btn-paste">Paste Text</button>
  </div>

  <!-- Controls (add stuff here later) -->
  <div id="controls">
    <!-- controls go here -->
  </div>

</div>

<script src="libv86.js"></script>
<script>
let emulator = null;
let muted    = false;

/* ── CLOCK in status bar ── */
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('status-time').textContent = h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();

/* ── FULLSCREEN ── */
document.getElementById('btn-fullscreen').addEventListener('click', function() {
  const wrap = document.getElementById('screen-wrap');
  if (!document.fullscreenElement) {
    wrap.requestFullscreen && wrap.requestFullscreen();
    this.title = 'Exit Fullscreen';
  } else {
    document.exitFullscreen && document.exitFullscreen();
    this.title = 'Fullscreen';
  }
});

/* ── RESTART ── */
document.getElementById('btn-reset').addEventListener('click', function() {
  if (emulator) {
    emulator.restart();
    document.getElementById('status-msg').textContent = 'Rebooting...';
    setTimeout(() => {
      document.getElementById('status-msg').textContent = 'Ready';
    }, 4000);
  }
});

/* ── MUTE ── */
document.getElementById('btn-mute').addEventListener('click', function() {
  muted = !muted;
  if (emulator) {
    const ctx = emulator.v86.cpu.devices.sound && emulator.v86.cpu.devices.sound.audio_context;
    if (ctx) {
      muted ? ctx.suspend() : ctx.resume();
    }
  }
  this.textContent = 'Mute: ' + (muted ? 'ON' : 'OFF');
  this.classList.toggle('pressed', muted);
});

/* ── SCREENSHOT ── */
document.getElementById('btn-screenshot').addEventListener('click', function() {
  const src = document.querySelector('#screen canvas');
  if (!src) return;
  const out = document.createElement('canvas');
  out.width  = src.width;
  out.height = src.height;
  const ctx = out.getContext('2d');
  ctx.drawImage(src, 0, 0);
  const a = document.createElement('a');
  a.href = out.toDataURL('image/png');
  a.download = 'freedos-screenshot.png';
  a.click();
});

/* ── PASTE TEXT ── */
document.getElementById('btn-paste').addEventListener('click', function() {
  const text = prompt('Type text to send to FreeDOS:');
  if (text && emulator) {
    emulator.keyboard_send_text(text);
  }
});

/* ── CLOSE — visual only ── */

/* ── TITLE BAR MENU ITEMS (stub — visual only for now) ── */
document.querySelectorAll('.menuitem').forEach(el => {
  el.addEventListener('click', () => {
    /* placeholder — add menus here later */
  });
});

/* ── V86 ── */
if (typeof V86 !== 'undefined') {
  emulator = new V86({
    wasm_path:       "v86.wasm",
    memory_size:     32 * 1024 * 1024,
    vga_memory_size: 8  * 1024 * 1024,
    screen_container: document.getElementById("screen"),
    bios:   { url: "seabios.bin"  },
    vga_bios: { url: "vgabios.bin" },
    fda:    { url: "freedos.img"  },
    autostart: true
  });

  setTimeout(() => {
    document.getElementById('status-msg').textContent = 'Ready';
  }, 5000);
}
</script>
</body>
</html>
