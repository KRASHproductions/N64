<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FreeDOS 772</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-sizing: border-box;
      gap: 6px;
    }

    /* ── CONTROLS SECTION (add stuff here later) ── */
    #controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    #screen-wrap {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      border: 1px solid #aaa;
      padding: 10px;
      box-sizing: border-box;
    }

    #screen {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 720px;
      height: 400px;
    }

    #screen canvas {
      display: block;
      image-rendering: pixelated;
      width: 720px;
      height: 400px;
    }
  </style>
</head>
<body>

<div id="controls">
  <!-- controls go here -->
</div>

<div id="screen-wrap">
  <div id="screen"></div>
</div>

<script src="libv86.js"></script>
<script>
  new V86({
    wasm_path: "v86.wasm",
    memory_size: 32 * 1024 * 1024,
    vga_memory_size: 8 * 1024 * 1024,
    screen_container: document.getElementById("screen"),
    bios: { url: "seabios.bin" },
    vga_bios: { url: "vgabios.bin" },
    fda: { url: "freedos.img" },
    autostart: true
  });
</script>
</body>
</html>
