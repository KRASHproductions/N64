<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FreeDOS 772</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --phosphor: #33ff33;
      --phosphor-dim: #1a7a1a;
      --phosphor-glow: #00ff0044;
      --bg: #0a0a0a;
      --bezel: #2a2520;
      --bezel-light: #3d3830;
      --bezel-shadow: #111009;
      --knob: #1e1b16;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      background-image: 
        radial-gradient(ellipse at 50% 50%, #1a1208 0%, #0a0805 60%, #050503 100%);
      padding: 20px;
      gap: 0;
    }

    /* ── MONITOR SHELL ── */
    .monitor {
      background: linear-gradient(145deg, var(--bezel-light) 0%, var(--bezel) 40%, var(--bezel-shadow) 100%);
      border-radius: 18px 18px 24px 24px;
      padding: 28px 32px 20px;
      box-shadow:
        0 0 0 1px #000,
        0 4px 8px #000a,
        0 20px 60px #0008,
        inset 0 1px 0 #5a5040,
        inset 0 -1px 0 #111;
      position: relative;
      width: min(820px, 98vw);
    }

    /* brand badge */
    .monitor::before {
      content: "FREEDOS 772";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'VT323', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      color: #6a5f4a;
      text-shadow: 0 1px 0 #000;
    }

    /* ── SCREEN BEZEL INSET ── */
    .screen-bezel {
      background: #050504;
      border-radius: 8px;
      padding: 14px;
      box-shadow:
        inset 0 2px 12px #000,
        inset 0 0 0 1px #000,
        0 1px 0 #4a4030;
      position: relative;
    }

    /* CRT curvature illusion */
    .screen-bezel::after {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 6px;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,200,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── V86 SCREEN CONTAINER ── */
    #screen {
      width: 100%;
      min-height: 340px;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    /* scanline overlay */
    #screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* vignette */
    #screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 6;
    }

    /* v86 canvas gets phosphor glow */
    #screen canvas {
      display: block;
      width: 100% !important;
      image-rendering: pixelated;
      filter: brightness(1) contrast(1.08);
    }

    /* ── CONTROLS PANEL ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 8px 4px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* ── KNOB ── */
    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .knob-label {
      font-family: 'VT323', monospace;
      font-size: 11px;
      color: #7a6e58;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .knob-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      cursor: pointer;
      user-select: none;
    }

    .knob-body {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #3a342a, #1a1610 60%, #0e0c09);
      box-shadow:
        0 2px 6px #000a,
        inset 0 1px 0 rgba(255,240,200,0.12),
        0 0 0 2px #111,
        0 0 0 3px #2a2520;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* tick mark on knob */
    .knob-tick {
      width: 3px;
      height: 12px;
      background: var(--phosphor);
      border-radius: 2px;
      box-shadow: 0 0 4px var(--phosphor);
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      transform-origin: bottom center;
      transition: transform 0s;
    }

    /* ── LED INDICATORS ── */
    .led-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .led-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0a0a0a;
      box-shadow: inset 0 1px 2px #000;
      transition: all 0.3s;
    }
    .led.green  { background: #00cc00; box-shadow: 0 0 6px #00ff00, inset 0 1px 0 rgba(255,255,255,0.3); }
    .led.amber  { background: #cc7700; box-shadow: 0 0 6px #ffaa00, inset 0 1px 0 rgba(255,255,255,0.3); }
    .led.red    { background: #cc0000; box-shadow: 0 0 6px #ff3300, inset 0 1px 0 rgba(255,255,255,0.3); }

    .led-text {
      font-family: 'VT323', monospace;
      font-size: 11px;
      color: #6a5f4a;
      letter-spacing: 1px;
    }

    /* ── BUTTONS ── */
    .ctrl-btn {
      background: linear-gradient(to bottom, #2e2820, #1a1610);
      border: 1px solid #111;
      border-radius: 5px;
      color: #9a8e78;
      font-family: 'VT323', monospace;
      font-size: 13px;
      letter-spacing: 1.5px;
      padding: 5px 12px;
      cursor: pointer;
      box-shadow:
        0 2px 0 #000,
        inset 0 1px 0 rgba(255,240,180,0.07);
      transition: all 0.08s;
      user-select: none;
      white-space: nowrap;
    }
    .ctrl-btn:hover { color: var(--phosphor); border-color: var(--phosphor-dim); box-shadow: 0 0 8px var(--phosphor-glow), 0 2px 0 #000; }
    .ctrl-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #000; }

    /* ── BRIGHTNESS / CONTRAST SLIDERS ── */
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .slider-row label {
      font-family: 'VT323', monospace;
      font-size: 11px;
      color: #6a5f4a;
      letter-spacing: 1px;
      width: 72px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 3px;
      background: #1a1610;
      border-radius: 2px;
      outline: none;
      box-shadow: inset 0 1px 2px #000;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      background: linear-gradient(to bottom, #3a3028, #1e1a14);
      box-shadow: 0 0 4px #000, inset 0 1px 0 rgba(255,240,180,0.15);
      cursor: pointer;
      border: 1px solid #0a0805;
    }
    input[type=range]:hover::-webkit-slider-thumb {
      background: linear-gradient(to bottom, var(--phosphor-dim), #1a3a1a);
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 6px 0;
      border-top: 1px solid #1a1610;
      margin-top: 6px;
    }

    .status-text {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--phosphor-dim);
      letter-spacing: 1px;
    }

    .status-text span { color: var(--phosphor); }

    /* ── STAND ── */
    .stand-neck {
      width: 60px;
      height: 22px;
      background: linear-gradient(to bottom, #2a2520, #1e1b16);
      margin: 0 auto;
      box-shadow: inset 2px 0 0 rgba(255,240,180,0.04), inset -2px 0 0 #000;
    }

    .stand-base {
      width: 220px;
      height: 14px;
      background: linear-gradient(to bottom, #2e2820, #1a1610);
      border-radius: 0 0 8px 8px;
      margin: 0 auto;
      box-shadow:
        0 4px 12px #0009,
        inset 0 1px 0 rgba(255,240,180,0.06);
    }

    /* ── SCANLINE TOGGLE STATE ── */
    .scanlines-off #screen::before { display: none; }

    /* ── FULLSCREEN HACK: stretch canvas ── */
    .fullscreen-mode #screen {
      min-height: 480px;
    }

    /* ── PHOSPHOR COLOR OPTIONS ── */
    .amber-mode #screen canvas  { filter: sepia(1) saturate(3) hue-rotate(10deg) brightness(1.1); }
    .amber-mode .led.green { background: #cc7700; box-shadow: 0 0 6px #ffaa00; }
    .white-mode #screen canvas  { filter: grayscale(1) brightness(1.15) contrast(1.1); }
  </style>
</head>
<body>

<div class="monitor" id="monitor">
  <div class="screen-bezel">
    <div id="screen"></div>
    <div class="status-bar">
      <span class="status-text">FREEDOS <span id="status-msg">BOOTING...</span></span>
      <span class="status-text">MEM: <span>32MB</span> &nbsp; VGA: <span>8MB</span></span>
    </div>
  </div>

  <div class="controls">
    <div class="controls-left">

      <!-- TEXT SIZE KNOB -->
      <div class="knob-group">
        <div class="knob-label">TEXT</div>
        <div class="knob-wrap" id="textKnob" title="Text Size">
          <div class="knob-body">
            <div class="knob-tick" id="textTick"></div>
          </div>
        </div>
      </div>

      <!-- BRIGHTNESS KNOB -->
      <div class="knob-group">
        <div class="knob-label">BRITE</div>
        <div class="knob-wrap" id="briteKnob" title="Brightness">
          <div class="knob-body">
            <div class="knob-tick" id="briteTick"></div>
          </div>
        </div>
      </div>

      <!-- CONTRAST SLIDER via KNOB -->
      <div class="knob-group">
        <div class="knob-label">CONT</div>
        <div class="knob-wrap" id="contKnob" title="Contrast">
          <div class="knob-body">
            <div class="knob-tick" id="contTick"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="controls-right">

      <!-- LED STATUS -->
      <div class="led-group">
        <div class="led-row">
          <div class="led green" id="ledPower"></div>
          <span class="led-text">PWR</span>
        </div>
        <div class="led-row">
          <div class="led" id="ledDisk"></div>
          <span class="led-text">DSK</span>
        </div>
      </div>

      <!-- BUTTONS -->
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;gap:6px;">
          <button class="ctrl-btn" id="btnScanlines">SCANLINES ON</button>
          <button class="ctrl-btn" id="btnPhosphor">PHOSPHOR: GRN</button>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="ctrl-btn" id="btnFullscreen">FULLSCREEN</button>
          <button class="ctrl-btn" id="btnReset">RESET</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="stand-neck"></div>
<div class="stand-base"></div>

<!-- v86 scripts -->
<script src="libv86.js"></script>
<script>
/* ────────────────────────────
   KNOB LOGIC
   Generic rotary knob: drag up/down to rotate -135° → +135°
   ──────────────────────────── */
function makeKnob(id, tickId, min, max, defaultVal, onChange) {
  const wrap = document.getElementById(id);
  const tick = document.getElementById(tickId);
  let val = defaultVal;
  let dragging = false;
  let startY = 0;
  let startVal = val;

  function setVal(v) {
    val = Math.max(min, Math.min(max, v));
    // map val range to -135..+135 degrees
    const pct = (val - min) / (max - min);
    const deg = -135 + pct * 270;
    tick.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    // shift transform-origin so it rotates around knob center
    tick.style.transformOrigin = '50% 100%';
    onChange(val);
  }

  wrap.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startVal = val;
    e.preventDefault();
  });
  wrap.addEventListener('touchstart', e => {
    dragging = true; startY = e.touches[0].clientY; startVal = val;
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = (startY - e.clientY) / 120;
    setVal(startVal + delta * (max - min));
  });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const delta = (startY - e.touches[0].clientY) / 120;
    setVal(startVal + delta * (max - min));
  });
  document.addEventListener('mouseup', () => dragging = false);
  document.addEventListener('touchend', () => dragging = false);

  // scroll on knob
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    setVal(val - Math.sign(e.deltaY) * (max - min) * 0.04);
  }, { passive: false });

  setVal(defaultVal); // init
}

/* TEXT SIZE KNOB — scales v86 canvas via CSS font-size on container */
makeKnob('textKnob','textTick', 0.5, 2.5, 1.0, v => {
  const canvas = document.querySelector('#screen canvas');
  if (canvas) canvas.style.fontSize = v + 'em';
  // also zoom the screen div
  document.getElementById('screen').style.transform = `scale(${v})`;
  document.getElementById('screen').style.transformOrigin = 'top left';
  document.getElementById('screen').style.width = `${100/v}%`;
});

/* BRIGHTNESS KNOB */
makeKnob('briteKnob','briteTick', 0.3, 2.0, 1.0, v => {
  updateFilter();
  window._brite = v;
});

/* CONTRAST KNOB */
makeKnob('contKnob','contTick', 0.5, 2.5, 1.08, v => {
  updateFilter();
  window._cont = v;
});

window._brite = 1.0;
window._cont = 1.08;

function updateFilter() {
  const mode = document.body.classList;
  if (mode.contains('amber-mode') || mode.contains('white-mode')) return;
  const canvas = document.querySelector('#screen canvas');
  if (canvas) canvas.style.filter = `brightness(${window._brite}) contrast(${window._cont})`;
}

/* ────────────────────────────
   SCANLINES TOGGLE
   ──────────────────────────── */
let scanlinesOn = true;
document.getElementById('btnScanlines').addEventListener('click', function() {
  scanlinesOn = !scanlinesOn;
  document.getElementById('monitor').classList.toggle('scanlines-off', !scanlinesOn);
  this.textContent = scanlinesOn ? 'SCANLINES ON' : 'SCANLINES OFF';
});

/* ────────────────────────────
   PHOSPHOR COLOR CYCLE
   ──────────────────────────── */
const phosphorModes = ['green','amber','white'];
let phosphorIdx = 0;
document.getElementById('btnPhosphor').addEventListener('click', function() {
  document.body.classList.remove('amber-mode','white-mode');
  phosphorIdx = (phosphorIdx + 1) % 3;
  const m = phosphorModes[phosphorIdx];
  if (m === 'amber') document.body.classList.add('amber-mode');
  if (m === 'white') document.body.classList.add('white-mode');
  this.textContent = `PHOSPHOR: ${m.toUpperCase().slice(0,3)}`;
  updateFilter();
});

/* ────────────────────────────
   FULLSCREEN
   ──────────────────────────── */
document.getElementById('btnFullscreen').addEventListener('click', function() {
  const mon = document.getElementById('monitor');
  if (!document.fullscreenElement) {
    mon.requestFullscreen && mon.requestFullscreen();
    this.textContent = 'EXIT FULL';
  } else {
    document.exitFullscreen && document.exitFullscreen();
    this.textContent = 'FULLSCREEN';
  }
});

/* ────────────────────────────
   V86 INIT
   ──────────────────────────── */
let emulator;
function startEmulator() {
  emulator = new V86({
    wasm_path: "v86.wasm",
    memory_size: 32 * 1024 * 1024,
    vga_memory_size: 8 * 1024 * 1024,
    screen_container: document.getElementById("screen"),
    bios: { url: "seabios.bin" },
    vga_bios: { url: "vgabios.bin" },
    fda: { url: "freedos.img" },
    autostart: true
  });

  // flicker disk LED on activity (poll every 200ms — v86 doesn't emit disk events easily)
  let ledTimer = setInterval(() => {
    const led = document.getElementById('ledDisk');
    led.classList.toggle('amber');
    setTimeout(() => led.classList.remove('amber'), 80);
  }, 400);

  // after ~3s assume boot settled
  setTimeout(() => {
    clearInterval(ledTimer);
    document.getElementById('ledDisk').classList.remove('amber');
    document.getElementById('status-msg').textContent = 'READY';
    document.getElementById('status-msg').style.color = '#33ff33';
  }, 5000);
}

/* ────────────────────────────
   RESET
   ──────────────────────────── */
document.getElementById('btnReset').addEventListener('click', () => {
  if (emulator) {
    emulator.restart();
    document.getElementById('status-msg').textContent = 'REBOOTING...';
    document.getElementById('status-msg').style.color = '#ffaa00';
    setTimeout(() => {
      document.getElementById('status-msg').textContent = 'READY';
      document.getElementById('status-msg').style.color = '#33ff33';
    }, 5000);
  }
});

// Start when libv86 is available
if (typeof V86 !== 'undefined') {
  startEmulator();
} else {
  document.getElementById('status-msg').textContent = 'LIB NOT FOUND';
  document.getElementById('ledPower').classList.remove('green');
  document.getElementById('ledPower').classList.add('red');
}
</script>
</body>
</html>
